<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在跳转中...</title>
    <!-- 0 秒后刷新到目标地址，实现自动跳转 -->
    <meta http-equiv="refresh" content="0; url=https://blog.sweizh.top/post/klhk-nas">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f0f4fa 0%, #e2e8f0 100%);
            font-family: system-ui, 'Segoe UI', 'Roboto', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            max-width: 580px;
            width: 100%;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            padding: 2.5rem 2rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.7);
            transition: all 0.2s;
        }
        .emoji-big {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1f3b4c;
            margin-bottom: 0.75rem;
        }
        .message {
            font-size: 1.1rem;
            color: #2c5368;
            margin-bottom: 1.8rem;
            line-height: 1.4;
        }
        .manual-link {
            display: inline-block;
            background: #eef2f9;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            font-weight: 500;
            color: #1f6392;
            text-decoration: none;
            border: 1px solid #cbddea;
            transition: all 0.2s;
        }
        .manual-link:hover {
            background: #1f6392;
            color: white;
            border-color: #1f6392;
            box-shadow: 0 6px 14px rgba(31,99,146,0.25);
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #6c7e93;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #cbddea;
            border-top-color: #1f6392;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .auto-hint {
            background: #eaf4ff;
            border-radius: 32px;
            padding: 0.6rem 1rem;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #155e7b;
        }
        @media (max-width: 500px) {
            .card { padding: 1.8rem 1.2rem; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji-big">🚀</div>
        <h1>即将为您跳转</h1>
        <div class="message">
            <span class="spinner"></span> 正在前往 <strong>blog.sweizh.top/post/klhk-nas</strong> ...
        </div>
        <div class="auto-hint">
            ⚡ 页面会自动跳转，如果没有反应，请点击下方按钮
        </div>
        <div style="margin-top: 1.5rem;">
            <a href="https://blog.sweizh.top/post/klhk-nas" class="manual-link" rel="noopener noreferrer">
                🔗 直接访问目标页面
            </a>
        </div>
        <div class="footer">
            © 2026 · 自动导航服务
        </div>
    </div>

    <!-- 额外的 JS 保障：如果 meta refresh 在某些环境下被阻止，用 JS 强制执行跳转 -->
    <script>
        // 立即执行跳转，确保即使 meta 被禁用或延迟也能跳转
        (function() {
            var targetUrl = "https://blog.sweizh.top/post/klhk-nas";
            // 使用 replace 避免在历史记录中留下当前页
            window.location.replace(targetUrl);
        })();
    </script>
</body>
</html>
